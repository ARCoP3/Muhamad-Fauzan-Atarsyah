<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
    <link rel="shortcut icon" type="image/png" href="img/Muhamad Fauzan Atarsyah.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0c0c0c;
            overflow: hidden;
            height: 100vh;
        }

        /* INTRO */
        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 20000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeOutIntro 4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            pointer-events: none;
        }

        .intro-text {
            color: #64ffda;
            font-size: clamp(1.5rem, 6vw, 2.5rem);
            font-family: 'Playfair Display', serif;
            text-align: center;
            line-height: 1.4;
            text-shadow: 0 0 20px rgba(100, 255, 218, 0.5);
            width: 90%;
            max-width: 800px;
            /* Teks akan tetap terlihat sampai overlay benar-benar menghilang */
            animation: textStay 4s forwards;
        }

        /* Baris 1 */
        .line1 {
            overflow: hidden;
            white-space: nowrap;
            margin: 0 auto;
            width: 0;
            animation: typing1 1.2s steps(15, end) forwards;
        }

        /* Baris 2 */
        .line2 {
            overflow: hidden;
            white-space: nowrap;
            margin: 0 auto;
            width: 0;
            animation: typing2 1.2s steps(15, end) 1.2s forwards;
            opacity: 0;
        }

        /* Credit Tan Malaka */
        .credit {
            font-size: 1rem;
            margin-top: 20px;
            opacity: 0;
            animation: fadeIn 0.5s 2.4s forwards;
            font-family: 'Inter', sans-serif;
            font-style: italic;
            color: #64ffda;
            letter-spacing: 1px;
        }

        @keyframes typing1 {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes typing2 {
            from { 
                width: 0;
                opacity: 1;
            }
            to { 
                width: 100%;
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from { 
                opacity: 0;
                transform: translateY(10px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Teks tetap utuh sampai akhir */
        @keyframes textStay {
            0%, 90% {
                opacity: 1;
                transform: scale(1);
            }
            95% {
                opacity: 0.8;
                transform: scale(0.98);
            }
            100% {
                opacity: 0;
                transform: scale(0.95);
            }
        }

        @keyframes fadeOutIntro {
            0% {
                background: #000;
                backdrop-filter: blur(0);
            }
            80% {
                background: #000;
                backdrop-filter: blur(0);
            }
            90% {
                background: rgba(0, 0, 0, 0.9);
                backdrop-filter: blur(2px);
            }
            95% {
                background: rgba(0, 0, 0, 0.5);
                backdrop-filter: blur(4px);
            }
            100% {
                background: rgba(0, 0, 0, 0);
                backdrop-filter: blur(6px);
                visibility: hidden;
            }
        }

        /* HERO SECTION */
        .hero {
            height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .image-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .image-background img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.5);
            animation: zoomBackground 20s ease-in-out infinite alternate;
            transform-origin: center;
        }

        .image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent, rgba(0,0,0,0.6));
            z-index: 1;
            animation: pulseOverlay 8s ease-in-out infinite alternate;
        }

        @keyframes zoomBackground {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); }
        }

        @keyframes pulseOverlay {
            0% { opacity: 0.6; }
            100% { opacity: 0.8; }
        }

        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            color: white;
            max-width: 800px;
            padding: 20px;
            opacity: 0;
            animation: showContent 0.8s 3.1s ease forwards;
        }

        @keyframes showContent {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #64ffda;
            border-radius: 50px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            backdrop-filter: blur(5px);
        }

        .badge img {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            margin-right: 8px;
            border: 2px solid #64ffda;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 5rem);
            font-family: 'Playfair Display', serif;
            margin-bottom: 15px;
        }

        h1 span {
            background: linear-gradient(135deg, #fff, #64ffda);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-style: italic;
        }

        p {
            font-size: 1rem;
            max-width: 500px;
            margin: 0 auto 25px;
            color: #ddd;
            line-height: 1.6;
            padding: 0 15px;
        }

        .cta-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            padding: 0 15px;
        }

        .btn {
            padding: 10px 24px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: #64ffda;
            color: #000;
        }

        .btn-outline {
            border: 1px solid #64ffda;
            color: #fff;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(100, 255, 218, 0.3);
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 0 15px;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
            color: #64ffda;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #aaa;
            text-transform: uppercase;
        }

        /* MOBILE SPECIFIC */
        @media (max-width: 768px) {
            .intro-text {
                font-size: 1.3rem;
            }

            .line1 {
                animation: typing1 1s steps(12, end) forwards;
            }

            .line2 {
                animation: typing2 1s steps(12, end) 1s forwards;
            }

            .credit {
                font-size: 0.9rem;
                margin-top: 15px;
                animation: fadeIn 0.4s 2s forwards;
            }

            @keyframes textStay {
                0%, 88% {
                    opacity: 1;
                    transform: scale(1);
                }
                94% {
                    opacity: 0.8;
                    transform: scale(0.98);
                }
                100% {
                    opacity: 0;
                    transform: scale(0.95);
                }
            }

            @keyframes fadeOutIntro {
                0% {
                    background: #000;
                    backdrop-filter: blur(0);
                }
                75% {
                    background: #000;
                    backdrop-filter: blur(0);
                }
                85% {
                    background: rgba(0, 0, 0, 0.9);
                    backdrop-filter: blur(1px);
                }
                92% {
                    background: rgba(0, 0, 0, 0.6);
                    backdrop-filter: blur(2px);
                }
                98% {
                    background: rgba(0, 0, 0, 0.2);
                    backdrop-filter: blur(4px);
                }
                100% {
                    background: rgba(0, 0, 0, 0);
                    backdrop-filter: blur(5px);
                    visibility: hidden;
                }
            }

            .hero-content {
                animation: showContent 0.7s 2.7s ease forwards;
            }

            h1 {
                font-size: 2.2rem;
            }
            
            p {
                font-size: 0.95rem;
            }
            
            .stats {
                gap: 20px;
            }

            .stat-number {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .intro-text {
                font-size: 1.1rem;
            }

            h1 {
                font-size: 1.8rem;
            }

            .badge {
                font-size: 0.75rem;
                padding: 6px 12px;
            }

            .badge img {
                width: 18px;
                height: 18px;
            }

            .credit {
                font-size: 0.8rem;
                margin-top: 12px;
            }

            .cta-group {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 200px;
                justify-content: center;
            }

            .stats {
                gap: 15px;
            }

            .stat-number {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <!-- INTRO -->
    <div class="intro-overlay">
        <div class="intro-text">
            <div class="line1">"Terbentur, terbentur,</div>
            <div class="line2">terbentur, kemudian terbentuk"</div>
            <div class="credit">— Tan Malaka</div>
        </div>
    </div>

    <!-- HERO -->
    <section class="hero">
        <div class="image-background">
            <img src="img/BACKGROUND.png" alt="background">
            <div class="image-overlay"></div>
        </div>

        <div class="hero-content">
            <div class="badge">
                <img src="img/Muhamad Fauzan Atarsyah.png" alt="logo">
                Welcome to my website
            </div>
            
            <h1><span>Fauzan Atarsyah</span></h1>
            
            <p>Dengan latar belakang di bidang IT, Saya menggabungkan logika teknologi dengan imajinasi sastra.</p>
            
            <div class="cta-group">
                <a href="home.html" class="btn btn-primary">Lihat Profil <i class="fas fa-arrow-right"></i></a>
                <a href="blog.html" class="btn btn-outline">Lihat Blog <i class="fas fa-arrow-right"></i></a>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number">6+</div>
                    <div class="stat-label">Months Experience</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">1</div>
                    <div class="stat-label">Projects Done</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">1</div>
                    <div class="stat-label">Happy Clients</div>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Timing yang tepat:
        // - Typing baris 1: 0-1.2s
        // - Typing baris 2: 1.2-2.4s
        // - Credit muncul: 2.4s
        // - Teks mulai fade: 3.6s (baru mulai fade di akhir)
        // - Overlay selesai: 4s
        // - Hero content muncul: 3.1s (lebih cepat dari fade teks)

        setTimeout(() => {
            document.querySelector('.intro-overlay').style.display = 'none';
        }, 4000);
    </script>
</body>
</html>
